name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  ConnectionStrings__OpenDental: Server=localhost;Port=3306;Database=opendental;User=reader;Password=ci_dummy
  FRONTEND_URL: http://localhost:3000

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend/OpenDentalSidecar.Api

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Docker build
        run: docker build -t opendental-sidecar-backend .

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ./frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Docker build
        run: docker build -t opendental-sidecar-frontend .

  docker-compose:
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Validate config
        run: docker compose config

      - name: Build all images
        run: docker compose build
